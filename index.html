<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Terminal</title>
    <meta
      name="description"
      content="Build a safe fake terminal for any website, add commands and answers, preview it, then copy the embed code."
    />
    <meta property="og:title" content="Website Terminal" />
    <meta
      property="og:description"
      content="A dependency-free fake terminal widget and builder for normal websites."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mir4zzz.github.io/website-terminal/" />
    <meta property="og:image" content="https://mir4zzz.github.io/website-terminal/assets/demo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Website Terminal" />
    <meta
      name="twitter:description"
      content="Add a safe browser-only terminal to a normal website and copy the embed code."
    />
    <meta name="twitter:image" content="https://mir4zzz.github.io/website-terminal/assets/demo.png" />
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./terminal.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101214;
        color: #f5f7fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          #101214;
        background-size: 36px 36px;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      h1,
      p,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        color: #a8b0bd;
        line-height: 1.65;
      }

      h2 {
        font-size: 1rem;
        letter-spacing: 0;
      }

      .builder-grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(340px, 1.08fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid rgba(245, 247, 250, 0.14);
        border-radius: 8px;
        padding: 18px;
        background: rgba(18, 22, 28, 0.82);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-kicker {
        color: #7dd3fc;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-size: 0.72rem;
        text-transform: uppercase;
      }

      .builder-form,
      .field,
      .command-list {
        display: grid;
        gap: 12px;
      }

      .field {
        gap: 6px;
      }

      label,
      .small-title {
        color: #f5f7fa;
        font-size: 0.82rem;
        font-weight: 700;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(245, 247, 250, 0.14);
        border-radius: 6px;
        padding: 10px 12px;
        background: rgba(4, 8, 14, 0.68);
        color: #f5f7fa;
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
        line-height: 1.5;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid rgba(245, 247, 250, 0.16);
        border-radius: 6px;
        padding: 10px 13px;
        background: #7dd3fc;
        color: #071016;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button.secondary {
        background: transparent;
        color: #f5f7fa;
      }

      .command-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .command-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(245, 247, 250, 0.12);
        border-radius: 6px;
        padding: 10px;
        background: rgba(4, 8, 14, 0.48);
      }

      .command-name {
        color: #7dd3fc;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-weight: 800;
      }

      .command-description,
      .status {
        color: #a8b0bd;
        font-size: 0.88rem;
      }

      .remove-button {
        padding: 8px 10px;
      }

      .embed-output {
        min-height: 180px;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-size: 0.82rem;
      }

      code {
        display: block;
        margin-top: 12px;
        color: #7dd3fc;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-size: 0.84rem;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        .builder-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Website Terminal</h1>
        <p>Build a browser-only terminal, add commands and answers, preview it, then copy the embed code.</p>
      </div>

      <section class="builder-grid" aria-label="Terminal builder">
        <div class="panel">
          <div class="panel-header">
            <h2>Live preview</h2>
            <p class="panel-kicker">browser only</p>
          </div>
          <div id="site-terminal"></div>
        </div>

        <aside class="panel">
          <div class="panel-header">
            <h2>Command builder</h2>
            <p class="panel-kicker">copy embed</p>
          </div>

          <form class="builder-form" id="builderForm">
            <div class="field">
              <label for="titleInput">Terminal title</label>
              <input id="titleInput" type="text" />
            </div>

            <div class="field">
              <label for="welcomeInput">Welcome lines</label>
              <textarea id="welcomeInput"></textarea>
            </div>

            <div class="field">
              <label for="commandInput">Command</label>
              <input id="commandInput" type="text" placeholder="about" />
            </div>

            <div class="field">
              <label for="descriptionInput">Help description</label>
              <input id="descriptionInput" type="text" placeholder="short help text" />
            </div>

            <div class="field">
              <label for="answerInput">Command answer</label>
              <textarea id="answerInput" placeholder="The text visitors see when they run the command."></textarea>
            </div>

            <div class="field">
              <label for="assetSourceInput">Asset source</label>
              <select id="assetSourceInput">
                <option value="cdn" selected>CDN links - paste anywhere</option>
                <option value="local">Local files - copy terminal.css and terminal.js</option>
              </select>
            </div>

            <div class="button-row">
              <button type="submit">Save command</button>
              <button class="secondary" id="resetButton" type="button">Reset</button>
              <button class="secondary" id="copyButton" type="button">Copy embed</button>
            </div>
            <p class="status" id="statusText" aria-live="polite"></p>
          </form>

          <div class="field">
            <p class="small-title">Commands</p>
            <ul class="command-list" id="commandList"></ul>
          </div>

          <div class="field">
            <label for="embedCode">Embed code</label>
            <textarea class="embed-output" id="embedCode" readonly></textarea>
          </div>
        </aside>
      </section>
    </main>

    <script src="./terminal.js"></script>
    <script src="./builder.js"></script>
  </body>
</html>
