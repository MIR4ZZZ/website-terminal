<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Terminal</title>
    <link rel="stylesheet" href="./terminal.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11100e;
        color: #f4f1ea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(204, 185, 142, 0.12), transparent 34%),
          radial-gradient(circle at 78% 24%, rgba(88, 156, 144, 0.18), transparent 30%),
          #11100e;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 6vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        color: #c9c0b1;
        line-height: 1.65;
      }

      .builder-grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.92fr) minmax(340px, 1.08fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        border: 1px solid rgba(244, 241, 234, 0.16);
        border-radius: 8px;
        padding: 18px;
        background: rgba(244, 241, 234, 0.06);
      }

      .builder-form,
      .field,
      .command-list {
        display: grid;
        gap: 12px;
      }

      .field {
        gap: 6px;
      }

      label,
      .small-title {
        color: #f4f1ea;
        font-size: 0.82rem;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(244, 241, 234, 0.16);
        border-radius: 6px;
        padding: 10px 12px;
        background: rgba(3, 6, 12, 0.62);
        color: #f4f1ea;
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
        line-height: 1.5;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid rgba(244, 241, 234, 0.18);
        border-radius: 6px;
        padding: 10px 13px;
        background: #b9dfca;
        color: #11100e;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      button.secondary {
        background: transparent;
        color: #f4f1ea;
      }

      .command-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .command-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(244, 241, 234, 0.14);
        border-radius: 6px;
        padding: 10px;
        background: rgba(3, 6, 12, 0.38);
      }

      .command-name {
        color: #b9dfca;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-weight: 800;
      }

      .command-description,
      .status {
        color: #c9c0b1;
        font-size: 0.88rem;
      }

      .remove-button {
        padding: 8px 10px;
      }

      .embed-output {
        min-height: 180px;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-size: 0.82rem;
      }

      code {
        display: block;
        margin-top: 12px;
        color: #b9dfca;
        font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
        font-size: 0.84rem;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        .builder-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Website Terminal</h1>
        <p>Build a browser-only terminal, add commands and answers, preview it, then copy the embed code.</p>
      </div>

      <section class="builder-grid" aria-label="Terminal builder">
        <div class="panel">
          <div id="site-terminal"></div>
        </div>

        <aside class="panel">
          <form class="builder-form" id="builderForm">
            <div class="field">
              <label for="titleInput">Terminal title</label>
              <input id="titleInput" type="text" />
            </div>

            <div class="field">
              <label for="welcomeInput">Welcome lines</label>
              <textarea id="welcomeInput"></textarea>
            </div>

            <div class="field">
              <label for="commandInput">Command</label>
              <input id="commandInput" type="text" placeholder="about" />
            </div>

            <div class="field">
              <label for="descriptionInput">Help description</label>
              <input id="descriptionInput" type="text" placeholder="what this command does" />
            </div>

            <div class="field">
              <label for="answerInput">Answer</label>
              <textarea id="answerInput" placeholder="The text visitors see when they run the command."></textarea>
            </div>

            <div class="button-row">
              <button type="submit">Save command</button>
              <button class="secondary" id="resetButton" type="button">Reset</button>
              <button class="secondary" id="copyButton" type="button">Copy embed</button>
            </div>
            <p class="status" id="statusText" aria-live="polite"></p>
          </form>

          <div class="field">
            <p class="small-title">Commands</p>
            <ul class="command-list" id="commandList"></ul>
          </div>

          <div class="field">
            <label for="embedCode">Embed code</label>
            <textarea class="embed-output" id="embedCode" readonly></textarea>
          </div>
        </aside>
      </section>
    </main>

    <script src="./terminal.js"></script>
    <script src="./builder.js"></script>
  </body>
</html>
